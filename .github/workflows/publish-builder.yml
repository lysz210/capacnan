name: Publish Nats capacnan builder Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Allows you to trigger this build manually from the Actions tab

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-builder

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository (Fetch all history for git diff)
        uses: actions/checkout@v6

      - name: Set up JDK
        if: ${{ steps.change_check.outputs.skip != 'true' }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Extract Clean Version from Blueprint
        id: get_version
        run: |
          RAW_VERSION=$(./gradlew :blueprint-builder:properties -q | grep "version:" | awk '{print $2}')
          CLEAN_VERSION=$(echo "$RAW_VERSION" | sed 's/-SNAPSHOT//g')
          echo "version=$CLEAN_VERSION" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        if: ${{ steps.change_check.outputs.skip != 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./blueprint-builder/src/main/docker/Dockerfile.jvm-micro
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest