name: Publish Chaskiwasi Image

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Publish Blueprint Module"]
    types:
      - completed

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-chaskiwasi

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository (Fetch all history for git diff)
        uses: actions/checkout@v6
        with:
          fetch-depth: 2 # Required to compare the current commit against the previous one

      # 1. Check if files in blueprint resources changed (only evaluated when triggered by workflow_run)
      - name: Check Blueprint Resources Changes
        id: change_check
        if: ${{ github.event_name == 'workflow_run' }}
        run: |
          # Check if the last commit modified anything in the blueprint resources directory
          if git diff --quiet HEAD^ HEAD -- blueprint/src/main/resources; then
            echo "No changes found in blueprint resources. Skipping build."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Changes detected in blueprint resources."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK
        if: ${{ steps.change_check.outputs.skip != 'true' }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Extract Clean Version from Blueprint
        if: ${{ steps.change_check.outputs.skip != 'true' }}
        id: get_version
        run: |
          RAW_VERSION=$(./gradlew :blueprint:properties -q | grep "version:" | awk '{print $2}')
          CLEAN_VERSION=$(echo "$RAW_VERSION" | sed 's/-SNAPSHOT//g')
          echo "version=$CLEAN_VERSION" >> $GITHUB_OUTPUT
      - name: Set up QEMU
        if: ${{ steps.change_check.outputs.skip != 'true' }}
        uses: docker/setup-qemu-action@v4

      # ADD THIS STEP: Set up Docker Buildx (required for multi-platform builds)
      - name: Set up Docker Buildx
        if: ${{ steps.change_check.outputs.skip != 'true' }}
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        if: ${{ steps.change_check.outputs.skip != 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        if: ${{ steps.change_check.outputs.skip != 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./chaskiwasi/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest