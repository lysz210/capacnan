name: Publish Blueprint Root JARs to GitHub Packages

on:
  push:
    branches: [ main ]
    paths:
      - 'blueprint-root/**'
  workflow_dispatch:   # Allows you to trigger this build manually from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Vital: This gives GITHUB_TOKEN write access to your package registry

    steps:
      # 1. Checkout the repository using latest v6 LTS
      - name: Checkout Code
        uses: actions/checkout@v6

      # 2. Set up Java 21 LTS with native Gradle caching enabled
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin' # Eclipse Temurin is the industry default for CI
          cache: 'gradle'         # Speeds up subsequent builds dramatically

      - name: Run tests
        run: |
          chmod +x gradlew
          ./gradlew test

      # 3. Grant execute permissions to the wrapper and publish
      - name: Run Gradle Publish
        run: |
          chmod +x gradlew
          ./gradlew :blueprint-root:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically generated by GitHub for this run