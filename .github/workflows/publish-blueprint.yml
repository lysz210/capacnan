name: Publish Blueprint Module

on:
  push:
    branches:
      - main
    paths:
      - 'blueprint/**' # Triggers ONLY if files in the blueprint folder change
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25' # Change to your Java version
          cache: 'gradle'

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      # Runs the publish task specifically for the blueprint module
      - name: Publish Blueprint Module
        run: |
          chmod +x gradlew
          ./gradlew publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}