capacnan:
  credentials:
    domain: "credentials"
    name-prefix: "${capacnan.root}_${capacnan.credentials.domain}"
    key-prefix: "${capacnan.root}.${capacnan.credentials.domain}"
    # KV store for external system tokens (Garmin, Intervals, Flickr, etc.)
    kv:
      bucket: "${capacnan.credentials.name-prefix}_store"
    # Stream for credentials audit/auth flows if needed
    stream: "${capacnan.credentials.name-prefix}_events"
    subjects:
      - "${capacnan.credentials.key-prefix}.>"
