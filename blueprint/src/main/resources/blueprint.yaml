capacnan:
  root: "capacnan"

  # -----------------------------------------------------------------
  # 1. SECURITY DOMAIN (Claviger / OAuth2 / External API Tokens)
  # -----------------------------------------------------------------
  security:
    domain: "security"
    name-prefix: "${capacnan.root}_${capacnan.security.domain}"
    key-prefix: "${capacnan.root}.${capacnan.security.domain}"
    # KV store for external system tokens (Garmin, Intervals, Flickr, etc.)
    kv:
      bucket: "${capacnan.security.name-prefix}_credentials"
    # Stream for security audit/auth flows if needed
    stream: "${capacnan.security.name-prefix}_events"
    subjects:
      - "${capacnan.security.key-prefix}.>"

  # -----------------------------------------------------------------
  # 2. GEO DOMAIN (Alidrisi & Ruwaat Integrations)
  # -----------------------------------------------------------------
  geo:
    domain: "geo"
    name-prefix: "${capacnan.root}_${capacnan.geo.domain}"
    key-prefix: "${capacnan.root}_${capacnan.geo.domain}"

    kv:
      bucket: "${capacnan.geo.name-prefix}_activities"
    object-store:
      bucket: "${capacnan.geo.name-prefix}_files"

    stream: "${capacnan.geo.name-prefix}_events"
    subjects:
      - "${capacnan.geo.key-prefix}.>"
